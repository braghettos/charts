  kubernetes-cluster:
  - apiVersion: v2
    appVersion: "1.0"
    created: "2026-06-22T13:34:25.80044+02:00"
    description: 'Krateo blueprint that turns a set of Ironic-managed bare-metal nodes
      into a vanilla kubeadm-bootstrapped Kubernetes cluster. Renders one BaremetalLifecycle
      per cluster member (control plane + workers) and gates the join sequence on
      the control plane having published its `kubeadm join` command into its own Node
      CR''s spec.extra.kubeadm_join (rendezvous via the existing Node KOG primitive
      — no new CRDs, no new tools).  State machine:   cp:      lifecycle(deploy)  ->
      kubeadm init -> patch own Node.spec.extra   workers: gated on cp Node.spec.extra.kubeadm_join
      present            -> lifecycle(deploy) -> kubeadm join '
