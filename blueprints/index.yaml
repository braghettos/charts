      version: 0.13.0
    description: MongoDB Community Kubernetes operator (controller + mongodbcommunity.mongodb.com
      CRD) for the Krateo ClickStack observability data layer, packaged as a Krateo
      composition. Thin dependency-WRAPPER over the UNFORKED upstream MongoDB community-operator
      chart (which bundles the community-operator-crds subchart). The CRD ships in
      templates/, so core-provider applies it on render and the composition's helm
      release deletes it cleanly on teardown. No sample MongoDBCommunity CR is created
      (createResource defaults false). The installer wires `krateo-clickstack` to
      depend on this composition, so the mongodbcommunity CRD is established AND the
      operator is running before any MongoDBCommunity CR renders. No fork of upstream.
