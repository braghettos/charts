      name: clickhouse-operator-helm
      repository: oci://ghcr.io/clickhouse
      version: 0.0.5
    description: ClickHouse Kubernetes operator (controller + clickhouse.com CRDs)
      for the Krateo ClickStack observability data layer, packaged as a Krateo composition.
      Thin dependency-WRAPPER over the UNFORKED upstream clickhouse-operator-helm
      chart; the admission webhook + cert-manager Certificates are disabled (the operator
      still reconciles ClickHouseCluster / KeeperCluster). Its CRDs ship in the upstream
      chart's templates/ (not crds/), so core-provider applies them on render and
      the composition's helm release deletes them cleanly on teardown. The installer
      wires `krateo-clickstack` to depend on this composition, so the clickhouse.com
      CRDs are established AND the operator is running before any ClickHouseCluster
      CR renders. No fork of upstream.
