    dependencies:
    - alias: crds
      name: kagent-crds
      repository: oci://ghcr.io/kagent-dev/kagent/helm
      version: 0.9.9
    description: kagent.dev (+ kmcp) CRDs for the Krateo agentic stack, packaged as
      a Krateo composition. Thin dependency-WRAPPER over the UNFORKED upstream kagent-crds
      chart — its CRDs ship in templates/, so the composition's helm release owns
      them and `helm uninstall` (on teardown) deletes them cleanly (no crds/ leftover).
      The kagent composition depends on this one being Ready, so the CRDs are installed
      AND established before any kagent CR renders — replacing the old crds/ pre-install
      hack with composition dependency ordering. No fork of upstream.
