name: reindex

# Rebuilds both channel indexes from the chart tarballs committed on the gh-pages
# branch (the seed storage model: .tgz live under /blueprints and /operators next
# to their index.yaml). Manual only and non-destructive — it just re-runs
# `helm repo index` over the charts already present, so it never wipes content.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: charts-reindex
  cancel-in-progress: false

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Rebuild both indexes from committed .tgz
        run: |
          helm repo index blueprints --url https://braghettos.github.io/charts/blueprints
          helm repo index operators  --url https://braghettos.github.io/charts/operators

      - name: Commit if changed
        run: |
          git add blueprints/index.yaml operators/index.yaml
          if git diff --cached --quiet; then
            echo "indexes already in sync"
            exit 0
          fi
          git -c user.name=charts-ci -c user.email=ci@braghettos.github.io commit -m "reindex from committed charts"
          git push
